services:
  postgres:
    image: postgres:16-bookworm
    container_name: patientscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mimic
      POSTGRES_PASSWORD: mimic
      POSTGRES_DB: mimiciv
    # Host 5433 → container 5432 (avoids macOS Homebrew/Postgres.app already on 5432)
    ports:
      - "5433:5432"
    volumes:
      - mimic_pgdata:/var/lib/postgresql/data
      # Build scripts (downloaded by scripts/setup_mimic_demo.sh)
      - ./scripts/vendor/mimic-build:/mimic_build:ro
      # Demo CSVs (gitignored under ./data)
      - ./data/mimic-iv-demo/2.2:/mimic_data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimic -d mimiciv"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mimic_pgdata:
